<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law Edu Kit - Portal Literasi Digital</title>
    <!-- Dependencies: React, Tailwind, Lucide Icons -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .animate-zoom-in { animation: zoomIn 0.3s ease-out; }
        .animate-slide-up { animation: slideInUp 0.4s ease-out; }

        /* Mobile Layout Guard */
        .phone-container {
            height: 100vh;
            max-width: 450px;
            margin: 0 auto;
            background: white;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Reusable Lucide Icon Component
        const Icon = ({ name, size = 20, className = "", strokeWidth = 2 }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            return <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }} stroke-width={strokeWidth}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('beranda');
            const [activeMateriDetail, setActiveMateriDetail] = useState(null);
            
            // App state for Quizzes/Simulations
            const [kuisStep, setKuisStep] = useState(0);
            const [score, setScore] = useState(0);

            const logoUrl = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgBENwUGD91BGHhUBoMcXoE5lf0ZrT2rdSJVWEjkldYTAzOzC7MChAwupawsX8Slc4Kk33LjTTYd4WLZQcYQ28WAxYOllfZp1pYo-q_lX9YlDM9XQrfUGd6zQd65NfDSabb0PMprbxpyou5FVu65d0ocx_w5csdq3quXziggZ7wQGBVycQ2g5Tme_g82PIl/w200-h200/Desain%20tanpa%20judul%20(6).png";

            // Views
            const BerandaView = () => (
                <div className="space-y-6 animate-fade-in">
                    <div className="relative rounded-3xl overflow-hidden bg-gradient-to-br from-blue-600 to-indigo-700 p-6 text-white shadow-xl">
                        <div className="relative z-10">
                            <span className="inline-block px-2 py-0.5 bg-white/20 rounded-full text-[10px] font-bold uppercase tracking-wider mb-3">Terbaru</span>
                            <h2 className="text-2xl font-extrabold leading-tight mb-2">Bijak Berinternet,<br/>Selamat Dari Jerat!</h2>
                            <p className="text-blue-100 text-xs font-medium max-w-[85%] leading-relaxed">Pahami aturan main digital agar tetap aman dan nyaman.</p>
                            <button onClick={() => setActiveTab('materi')} className="mt-6 bg-white text-blue-700 px-5 py-2.5 rounded-full font-bold text-xs shadow-lg flex items-center gap-2 active:scale-95 transition-all">
                                Mulai Belajar <Icon name="chevron-right" size={14} />
                            </button>
                        </div>
                        <Icon name="scale" size={100} className="absolute -bottom-4 -right-4 opacity-10 rotate-12" />
                    </div>

                    <section>
                        <h3 className="font-extrabold text-slate-800 text-[10px] uppercase tracking-widest mb-4">Menu Utama</h3>
                        <div className="grid grid-cols-4 gap-3">
                            {[
                                { id: 'materi', label: 'Materi', icon: 'book-open', color: 'bg-blue-500' },
                                { id: 'simulasi', label: 'Simulasi', icon: 'zap', color: 'bg-emerald-500' },
                                { id: 'toolkit', label: 'Tools', icon: 'wrench', color: 'bg-violet-500' },
                                { id: 'kuis', label: 'Kuis', icon: 'trophy', color: 'bg-amber-500' },
                            ].map((item) => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className="flex flex-col items-center gap-2">
                                    <div className={`${item.color} w-full aspect-square rounded-2xl text-white shadow-md flex items-center justify-center active:scale-90 transition-transform`}>
                                        <Icon name={item.icon} size={22} />
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-600">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </section>

                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                        <div className="flex justify-between items-center mb-3">
                            <div className="flex items-center gap-2">
                                <Icon name="award" size={16} className="text-blue-600" />
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-tight">Progress Belajar</p>
                            </div>
                            <span className="text-xs font-extrabold text-blue-600">60%</span>
                        </div>
                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div className="bg-blue-500 h-full w-[60%] rounded-full"></div>
                        </div>
                    </div>
                </div>
            );

            const MateriView = () => {
                const materiItems = [
                    { id: 'privasi', title: 'Privasi & Data Pribadi', desc: 'Lindungi data diri dan informasi pribadimu di dunia digital.', icon: 'lock', color: 'bg-blue-500' },
                    { id: 'etika', title: 'Etika Komentar & Chat', desc: 'Berkomunikasi dengan sopan dan saling menghargai.', icon: 'message-circle', color: 'bg-emerald-400' },
                    { id: 'hoaks', title: 'Hoaks & Ujaran Kebencian', desc: 'Kenali hoaks dan hindari penyebaran ujaran kebencian.', icon: 'alert-triangle', color: 'bg-orange-400' },
                    { id: 'hukum', title: 'Hukum ITE (Untuk Pelajar)', desc: 'Pahami hak, kewajiban, dan aturan hukum di dunia digital.', icon: 'scale', color: 'bg-indigo-500' }
                ];

                if (activeMateriDetail) {
                    return (
                        <div className="animate-fade-in space-y-6">
                            <div className={`p-6 rounded-3xl text-white ${activeMateriDetail.color}`}>
                                <h4 className="font-bold mb-2 text-lg">{activeMateriDetail.title}</h4>
                                <p className="text-xs opacity-90 leading-relaxed">{activeMateriDetail.desc}</p>
                            </div>
                            
                            <div className="space-y-4">
                                <h5 className="font-bold text-slate-800 text-sm">Pembahasan Materi:</h5>
                                <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100 text-slate-600 text-xs leading-relaxed">
                                    Konten edukasi detail mengenai {activeMateriDetail.title} akan ditampilkan di sini. Meliputi panduan, tips, dan dasar hukum yang berlaku di Indonesia.
                                </div>
                            </div>

                            <button onClick={() => setActiveMateriDetail(null)} className="w-full bg-slate-100 py-3 rounded-2xl text-slate-600 font-bold text-xs uppercase tracking-wider">
                                Kembali ke Daftar
                            </button>
                        </div>
                    );
                }

                return (
                    <div id="main-menu" className="space-y-4 animate-slide-up">
                        {materiItems.map((item) => (
                            <button 
                                key={item.id} 
                                onClick={() => setActiveMateriDetail(item)}
                                className="w-full text-left bg-white border border-slate-100 rounded-2xl p-4 flex items-center gap-4 shadow-sm active:scale-95 transition-all"
                            >
                                <div className={`w-16 h-16 ${item.color} rounded-2xl flex items-center justify-center shrink-0`}>
                                    <Icon name={item.icon} size={32} className="text-white" />
                                </div>
                                <div className="flex-1">
                                    <h3 className="font-bold text-slate-800 text-sm">{item.title}</h3>
                                    <p className="text-[10px] text-slate-500 leading-relaxed">{item.desc}</p>
                                </div>
                                <Icon name="chevron-right" size={20} className="text-slate-400" />
                            </button>
                        ))}
                    </div>
                );
            };

            const ToolkitView = () => (
                <div className="space-y-4 animate-slide-up">
                    <h2 className="font-extrabold text-lg uppercase px-1">Digital Toolkit</h2>
                    {[
                        { t: 'Cek Hoaks', d: 'Deteksi kebenaran berita melalui portal terpercaya.', i: 'search', bg: 'bg-sky-50', c: 'text-sky-500' },
                        { t: 'Pass Security', d: 'Cek seberapa kuat kata sandi yang kamu miliki.', i: 'shield-check', bg: 'bg-emerald-50', c: 'text-emerald-500' },
                        { t: 'Lapor Cyber', d: 'Panduan melapor konten negatif & pelecehan.', i: 'file-text', bg: 'bg-indigo-50', c: 'text-indigo-500' },
                    ].map((item, idx) => (
                        <div key={idx} className="bg-white p-5 rounded-3xl border border-slate-100 flex items-center gap-4 shadow-sm">
                            <div className={`${item.bg} p-4 rounded-2xl`}><Icon name={item.i} size={24} className={item.c} /></div>
                            <div className="flex-1">
                                <p className="text-sm font-extrabold uppercase">{item.t}</p>
                                <p className="text-[10px] text-slate-400 leading-tight">{item.d}</p>
                            </div>
                            <Icon name="external-link" size={16} className="text-slate-200" />
                        </div>
                    ))}
                </div>
            );

            // App Core Structure
            return (
                <div className="phone-container">
                    {/* Header */}
                    <header className="bg-white px-5 py-4 flex items-center justify-between border-b border-slate-50 sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            {activeTab !== 'beranda' || activeMateriDetail ? (
                                <button onClick={() => {
                                    if (activeMateriDetail) setActiveMateriDetail(null);
                                    else setActiveTab('beranda');
                                }} className="p-2 bg-slate-50 rounded-full text-blue-600 active:scale-90 transition-transform">
                                    <Icon name="arrow-left" size={18} />
                                </button>
                            ) : (
                                <div className="w-9 h-9 bg-blue-50 rounded-lg p-1">
                                    <img src={logoUrl} alt="Logo" className="w-full h-full object-contain" />
                                </div>
                            )}
                            <div>
                                <h1 className="text-xs font-black text-slate-900 uppercase tracking-tighter leading-none">
                                    {activeMateriDetail ? 'Materi Detail' : (activeTab === 'beranda' ? 'Law Edu Kit' : activeTab)}
                                </h1>
                                {activeTab === 'beranda' && !activeMateriDetail && <p className="text-[8px] text-blue-500 font-black uppercase tracking-widest mt-1">Smart Citizen</p>}
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button className="p-2 text-slate-400 hover:text-blue-600 transition-colors"><Icon name="bell" size={18} /></button>
                        </div>
                    </header>

                    {/* Content Container */}
                    <main className="flex-1 overflow-y-auto px-5 py-6 pb-28">
                        {activeTab === 'beranda' && <BerandaView />}
                        {activeTab === 'materi' && <MateriView />}
                        {activeTab === 'toolkit' && <ToolkitView />}
                        {activeTab === 'simulasi' && (
                            <div className="text-center py-20 animate-zoom-in">
                                <Icon name="zap" size={60} className="text-emerald-500 mx-auto mb-4" />
                                <h3 className="text-lg font-black uppercase">Fitur Simulasi</h3>
                                <p className="text-slate-400 text-xs px-10 mt-2">Segera hadir skenario interaktif untuk melatih responmu terhadap kasus hukum digital.</p>
                            </div>
                        )}
                        {activeTab === 'kuis' && (
                            <div className="text-center py-20 animate-zoom-in">
                                <Icon name="trophy" size={60} className="text-amber-500 mx-auto mb-4" />
                                <h3 className="text-lg font-black uppercase">Uji Pemahaman</h3>
                                <p className="text-slate-400 text-xs px-10 mt-2">Segera hadir berbagai kuis menantang untuk mengukur pengetahuan digitalmu.</p>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="glass-nav border-t border-slate-50 flex justify-around py-3 absolute bottom-0 w-full z-50">
                        {[
                            { id: 'beranda', icon: 'home', label: 'Home' },
                            { id: 'materi', icon: 'book-open', label: 'Materi' },
                            { id: 'simulasi', icon: 'zap', label: 'Kasus' },
                            { id: 'kuis', icon: 'trophy', label: 'Kuis' },
                        ].map((tab) => (
                            <button
                                key={tab.id}
                                onClick={() => {
                                    setActiveTab(tab.id);
                                    setActiveMateriDetail(null);
                                }}
                                className={`flex flex-col items-center gap-1 transition-all flex-1 ${
                                    activeTab === tab.id ? 'text-blue-600' : 'text-slate-400'
                                }`}
                            >
                                <Icon name={tab.icon} size={20} strokeWidth={activeTab === tab.id ? 2.5 : 2} />
                                <span className="text-[9px] font-bold uppercase tracking-tighter">{tab.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
